COM_SMILEPACK_WIDGETS_PAGE_DESC="Widgets sind eine umfassende Sammlung verschiedener visueller und funktionaler Elemente, die Sie in Ihren Inhalten verwenden können. Mit einfachen Shortcodes können Sie ganz einfach Tabs, Akkordeons, Karten, Videos und Fotogalerien und vieles mehr erstellen."
COM_SMILEPACK_HEADERS_FOOTERS="Kopf- und Fußzeilen"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Fügen Sie CSS, Meta-Tags und Skripte wie Google Analytics und Facebook Pixels ein, ohne die Dateien Ihres Templates zu bearbeiten. Integrieren Sie Tracking-Codes in die Kopf-, Text- und Fußzeile Ihrer Seite, ob auf der gesamten Seite oder nur auf bestimmte Seiten. Nutzen Sie dabei die integrierte bedingte Logik."
COM_SMILEPACK_REUSABLE_SNIPPETS="Wiederverwendbare Snippets"
COM_SMILEPACK_REUSABLE_SNIPPETS_PAGE_DESC="Optimieren Sie die Inhaltserstellung und vermeiden Sie Redundanz. Erstellen Sie wiederverwendbare Text-, HTML-, JavaScript-, CSS- und PHP-Snippets, um die Konsistenz auf Ihrer gesamten Site zu gewährleisten. Sparen Sie mit der einfachen Shortcode-Integration Zeit und sorgen Sie für Präzision. Fügen Sie bedingte Logik für die dynamische Inhaltsanzeige hinzu und erhöhen Sie so die Vielseitigkeit."
