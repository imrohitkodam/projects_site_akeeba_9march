COM_SMILEPACK_MODULE_VIDEO_DESC="Betten Sie YouTube-, Vimeo-, Dailymotion- oder selbst gehostete Videos mit einem Wiedergabeplayer ein. Beginnen Sie damit, Ihre Inhalte ansprechender zu gestalten."
COM_SMILEPACK_MODULE_MAP="Karte"
COM_SMILEPACK_MODULE_MAP_DESC="Helfen Sie Besuchern, Ihr Unternehmen mit einer interaktiven Karte zu finden. Wählen Sie zwischen Google Maps, OpenStreetMaps und Bing Maps."
COM_SMILEPACK_MODULE_GALLERY="Galerie"
COM_SMILEPACK_MODULE_GALLERY_DESC="Erstelle Fotogalerien mit unseren Masonry, Grid, Justified und Slideshow Layouts. Perfekt, um deine Bilder darzustellen."
COM_SMILEPACK_MODULE_TABS="Tabs"
COM_SMILEPACK_MODULE_TABS_DESC="Vereinfachen Sie die Navigation und verbessern Sie die Benutzererfahrung mit schönen und vollständig anpassbaren Tabs."
COM_SMILEPACK_MODULE_ACCORDION="Accordion"
COM_SMILEPACK_MODULE_ACCORDION_DESC="Zeigen Sie Ihren Inhalt in vertikal zusammenklappbaren Panels an. Ideal für die übersichtliche Darstellung von FAQs und Produktfunktionen."
COM_SMILEPACK_MODULE_RANDOM_MODULE="Zufallsgenerator"
COM_SMILEPACK_MODULE_RANDOM_MODULE_DESC="Bieten Sie Besuchern dynamische und abwechslungsreiche Content-Erlebnisse, indem Sie bei jedem Besuch ein zufälliges Modul anzeigen."
COM_SMILEPACK_MODULE_PAYPAL="PayPal-Schaltfläche"
