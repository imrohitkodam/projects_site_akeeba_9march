COM_SMILEPACK_CONDITIONS_INDEX="Índice de condiciones"
COM_SMILEPACK_DISPLAY_CONDITIONS_ABOUT="Las opciones de visibilidad de módulos nativos de Joomla manejan aspectos básicos como elementos de menú y niveles de acceso, pero pueden resultar limitadas para los usuarios que desean un control más granular. <br><br>Con la pestaña <b>Condiciones de visualización</b> en cualquier página de edición de módulos, ahora puede establecer reglas para mostrar u ocultar módulos según criterios específicos a través de una lógica condicional flexible. Por ejemplo, puede mostrar un módulo solo a usuarios móviles, visitantes de un país o ciudad en particular, o establecer condiciones basadas en la hora, la fecha o la dirección IP. Los módulos pueden incluso responder al artículo específico de Joomla que está viendo un visitante o al sitio del que proviene. <br><br>Para los usuarios de comercio electrónico, las Condiciones de visualización incluyen reglas especializadas para <b>VirtueMart</b> y <b>HikaShop</b>, lo que le permite mostrar mensajes específicos a los compradores. <br><br>Para ahorrar tiempo, también puede <b>reflejar las condiciones</b> de otros módulos si varios módulos comparten las mismas reglas. Con soporte para lógica <b>AND</b> y <b>OR</b>, puede combinar múltiples condiciones para una segmentación aún más refinada. Estas reglas de visualización funcionan en todos los módulos de Joomla, tanto para módulos frontend como backend."
