COM_SMILEPACK_SMART_TAG="Balises intelligentes"
COM_SMILEPACK_SMARTTAGS_INTRO1="Les balises intelligentes sont de petits morceaux de code conçus pour insérer sans effort des informations pertinentes dans votre contenu, de la même manière qu'un programmeur utilise des variables lorsqu'il écrit du code. L'objectif principal des étiquettes intelligentes est de faciliter la création de contenu dynamique et personnalisé. "
COM_SMILEPACK_SMARTTAGS_INTRO2="Avec les balises intelligentes, vous pouvez générer des données, notamment la date et l'heure actuelles, l'adresse IP, l'appareil ou le pays du visiteur, l'URL de la page actuelle, le titre, l'identifiant, le nom ou l'adresse électronique de l'utilisateur actuellement connecté, ainsi qu'une myriade d'autres informations, sans aucune connaissance en matière de programmation."
