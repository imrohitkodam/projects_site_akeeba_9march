COM_SMILEPACK_SMART_TAGS="Balises intelligentes"
COM_SMILEPACK_WIDGETS_PAGE_DESC="Widgets est une collection complète d'éléments visuels et fonctionnels variés, que vous pouvez utiliser dans votre contenu. En utilisant des shortcodes simples, vous pouvez facilement créer des onglets, des accordéons, des cartes, des vidéos, des galeries de photos et bien plus encore."
COM_SMILEPACK_HEADERS_FOOTERS="En-têtes et pieds de pages"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Insérez des CSS, métabalises et scripts tels que Google Analytics et Facebook Pixels sans modifier les fichiers de votre modèle. Intégrer des codes de suivi dans l'en-tête, le corps et le pied de page de votre site, que ce soit sur l'ensemble du site ou sur des pages spécifiques, en utilisant une logique conditionnelle intégrée."
COM_SMILEPACK_REUSABLE_SNIPPETS="Extraits réutilisables"
COM_SMILEPACK_REUSABLE_SNIPPETS_PAGE_DESC="Rationalisez la création de contenu et éliminez les redondances. Créez des extraits réutilisables de texte, HTML, JavaScript, CSS et PHP pour assurer la cohérence de votre site. Grâce à l'intégration simple de shortcodes, gagnez du temps et conservez votre précision. Ajoutez une logique conditionnelle pour l'affichage dynamique du contenu, améliorant ainsi la polyvalence."
