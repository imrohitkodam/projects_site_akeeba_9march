COM_SMILEPACK_SMART_TAGS="Tag Intelligenti"
COM_SMILEPACK_WIDGETS_PAGE_DESC="Widget è una raccolta completa di vari elementi visivi e funzionali, che puoi utilizzare nei tuoi contenuti. Usando semplici shortcode, puoi facilmente creare schede, fisarmoniche, mappe, video e gallerie fotografiche e molto, molto di più."
COM_SMILEPACK_HEADERS_FOOTERS="Intestazioni e Piè di pagina"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Inserisci CSS, Meta Tag e Script come Google Analytics e Facebook Pixels senza modificare i file del tuo template. Integra i codici di tracciamento nell'intestazione, nel corpo e nel piè di pagina del tuo sito, sia a livello globale che su pagine specifiche, utilizzando la logica condizionale integrata."
COM_SMILEPACK_REUSABLE_SNIPPETS="Snippet Riutilizzabili"
COM_SMILEPACK_REUSABLE_SNIPPETS_PAGE_DESC="Semplifica la creazione di contenuti ed elimina la ridondanza. Crea snippet riutilizzabili di testo, HTML, JavaScript, CSS e PHP per mantenere la coerenza nel tuo sito. Con l'integrazione tramite shortcode semplici, risparmia tempo e mantieni la precisione. Aggiungi logica condizionale per la visualizzazione dinamica dei contenuti, migliorando la versatilità."
