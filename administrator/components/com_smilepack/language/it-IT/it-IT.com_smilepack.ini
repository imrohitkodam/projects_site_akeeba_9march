COM_SMILEPACK_SMART_TAG="Tag Intelligente"
COM_SMILEPACK_SMARTTAGS_INTRO1="I Tag Intelligenti sono piccoli pezzi di codice progettati per inserire facilmente informazioni rilevanti nei tuoi contenuti, proprio come un programmatore usa variabili quando scrive codice. Lo scopo principale dei Tag Intelligenti è facilitare la creazione di contenuti dinamici e personalizzati."
COM_SMILEPACK_SMARTTAGS_INTRO2="Con i Tag Intelligenti, puoi ottenere dati, inclusi la Data e l'Ora attuali, l'IP del Visitatore, il Dispositivo o il Paese, l'URL della pagina corrente, il Titolo, l'ID, il Nome o l'Email dell'utente attualmente connesso e molte altre informazioni senza alcuna competenza di programmazione."
