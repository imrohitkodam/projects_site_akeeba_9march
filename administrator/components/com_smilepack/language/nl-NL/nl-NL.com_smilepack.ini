COM_SMILEPACK_WIDGETS_PAGE_DESC="Widgets is een uitgebreide verzameling van verschillende visuele en functionele elementen, die je in jouw inhoud kunt gebruiken. Met behulp van eenvoudige shortcodes kan je eenvoudig tabbladen, accordeons, kaarten, video's en fotogalerijen maken en nog heel, veel meer."
COM_SMILEPACK_HEADERS_FOOTERS="Kop- & Voetteksten"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Voeg CSS, metatags en scripts zoals Google Analytics en Facebook Pixels in zonder de bestanden van jouw sjabloon te bewerken. Integreer trackingcodes in de koptekst, hoofdtekst en voettekst van jouw site, zowel op de hele site als op specifieke pagina's, met behulp van ingebouwde voorwaardelijke logica."
COM_SMILEPACK_REUSABLE_SNIPPETS="Herbruikbare fragmenten"
COM_SMILEPACK_REUSABLE_SNIPPETS_PAGE_DESC="Stroomlijn het maken van inhoud en elimineer redundantie. Maak herbruikbare tekstfragmenten, HTML, JavaScript, CSS en PHP om de consistentie op jouw site te behouden. Met eenvoudige shortcode-integratie bespaart je tijd en behoudt je de nauwkeurigheid. Voeg voorwaardelijke logica toe voor dynamische inhoudsweergave, waardoor de veelzijdigheid wordt vergroot."
