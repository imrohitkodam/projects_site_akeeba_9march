; COM_SMILEPACK_CONDITIONS_INDEX="Conditions Index"
; COM_SMILEPACK_DISPLAY_CONDITIONS_ABOUT="Joomla’s native module visibility options handle basics like menu items and access levels but can feel limited for users wanting more granular control.<br><br>With the <b>Display Conditions</b> tab on any module editing page, you can now set rules to show or hide modules based on specific criteria through flexible conditional logic. For example, you can display a module only to mobile users, visitors from a particular country or city, or set conditions based on time, date, or IP address. Modules can even respond to the specific Joomla article a visitor is viewing or the site they came from.<br><br>For eCommerce users, Display Conditions include specialized rules for <b>VirtueMart</b> and <b>HikaShop</b>, letting you show targeted messages to shoppers.<br><br>To save time, you can also <b>mirror conditions</b> from other modules if multiple modules share the same rules. With support for both <b>AND</b> and <b>OR</b> logic, you can combine multiple conditions for even more refined targeting. These display rules work across all Joomla modules for both front-end and back-end modules."
