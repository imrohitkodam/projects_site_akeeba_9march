COM_SMILEPACK_SMART_TAGS="Tags inteligentes"
COM_SMILEPACK_WIDGETS_PAGE_DESC="Widgets é uma coleção abrangente de vários elementos visuais e funcionais, que você pode usar em seu conteúdo. Usando códigos de acesso simples, você pode criar facilmente guias, acordeões, mapas, vídeos e galerias de fotos e muito, muito mais."
COM_SMILEPACK_HEADERS_FOOTERS="Cabeçalhos e rodapés"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Insira CSS, Meta Tags e Scripts como Google Analytics e Facebook Pixels sem editar os arquivos do seu template. Integre códigos de rastreamento ao cabeçalho, corpo e rodapé do seu site, seja em todo o site ou em páginas específicas, utilizando lógica condicional integrada."
