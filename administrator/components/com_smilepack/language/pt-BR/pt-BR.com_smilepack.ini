COM_SMILEPACK_SMARTTAGS_INTRO1="Tags inteligentes são pequenos pedaços de código projetados para inserir facilmente informações relevantes em seu conteúdo, da mesma forma que um programador usa variáveis ao escrever código. O objetivo principal da Smart Tag é facilitar a criação de conteúdo dinâmico e personalizado."
COM_SMILEPACK_SMARTTAGS_INTRO2="Com tags inteligentes, você pode gerar dados, incluindo data e hora atuais, IP do visitante, dispositivo ou país, URL da página atual, título, ID de usuário atualmente conectado, nome ou e-mail e uma infinidade de outras informações sem qualquer conhecimento de programação ."
