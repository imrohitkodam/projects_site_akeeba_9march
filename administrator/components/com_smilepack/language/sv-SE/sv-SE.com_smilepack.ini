COM_SMILEPACK_CONDITIONS_INDEX="Villkorsindex"
COM_SMILEPACK_DISPLAY_CONDITIONS_ABOUT="Joomlas inbyggda modulsynlighetsalternativ hanterar grunder som menyalternativ och åtkomstnivåer men kan kännas begränsade för användare som vill ha mer detaljerad kontroll.<br><br>Med fliken <b>Visningsvillkor</b> på någon moduls redigeringssida, kan du nu ställa in regler för att visa eller dölja moduler baserat på specifika kriterier genom flexibel villkorlig logik. Du kan till exempel visa en modul endast för mobilanvändare, besökare från ett visst land eller en viss stad, eller ange villkor baserat på tid, datum eller IP-adress. Moduler kan till och med svara på den specifika Joomla-artikeln en besökare tittar på eller webbplatsen de kom ifrån. <br><br>För e-handelsanvändare inkluderar visningsvillkor specialiserade regler för <b>VirtueMart</b> och <b>HikaShop</b>, så att du kan visa riktade budskap till kunder. <br><br>För att spara tid kan du också <b>spegla villkor</b> från andra moduler som delar samma regler. Med stöd för både <b>AND</b> och <b>OR</b> logik, kan du kombinera flera villkor för ännu mer förfinad målgruppsinriktning. Dessa visningsregler fungerar i alla Joomla-moduler för både front-end- och back-end-moduler."
