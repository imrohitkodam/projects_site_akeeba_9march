COM_SMILEPACK_WIDGETS_PAGE_DESC="Widgets är en omfattande samling av olika visuella och funktionella element som du kan använda i ditt innehåll. Med hjälp av enkla kortkoder kan du enkelt skapa flikar, dragspel, kartor, videor och fotogallerier och mycket, mycket mer."
COM_SMILEPACK_HEADERS_FOOTERS="Sidhuvud & Sidfot"
COM_SMILEPACK_HEADERS_FOOTERS_PAGE_DESC="Infoga CSS, metataggar och skript som Google Analytics och Facebook-pixlar utan att redigera mallfilerna. Integrate tracking codes into your site's header, body, and footer, whether sitewide or on specific pages, utilizing built-in conditional logic. Integrera spårningskoder i webbplatsens sidhuvud, brödtext och sidfot, oavsett om det gäller hela webbplatsen eller på specifika sidor, med hjälp av inbyggd villkorlig logik."
COM_SMILEPACK_REUSABLE_SNIPPETS="Återanvändningsbara Snippets"
COM_SMILEPACK_REUSABLE_SNIPPETS_PAGE_DESC="Effektivisera skapande av innehåll och eliminera redundans. Skapa återanvändbara textavsnitt, HTML, JavaScript, CSS och PHP för att upprätthålla enhetlighet på hela din webbplats. Spara tid och bibehåll precisionen med enkel integration av kortkoder. Lägg till villkorlig logik för dynamisk innehållsvisning, vilket ökar mångsidigheten."
