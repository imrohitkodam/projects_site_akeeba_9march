COM_SMILEPACK_SMARTTAGS_INTRO1="Smarta taggar är små kodbitar utformade för att enkelt infoga relevant information i ditt innehåll, ungefär som hur en programmerare använder variabler när de skriver kod. Det primära syftet med smarta taggar är att underlätta skapandet av dynamiskt och personligt innehåll."
COM_SMILEPACK_SMARTTAGS_INTRO2="Med smarta taggar kan du mata ut data, inklusive aktuellt datum och tid, besökarens IP-adress, enhet eller land, aktuell sid-URL, titel, inloggat användar-ID, namn eller e-postadress och en myriad av annan information utan någon programmeringsexpertis."
