PLG_PRIVACY_QUICK2CART="Privacy - Quick2Cart"
PLG_PRIVACY_QUICK2CART_XML_DESCRIPTION="Quick2Cart privacy plugin"

PLG_PRIVACY_QUICK2CART_PRIVACY_CAPABILITY_USER_STORES_DETAIL="Store Owner's Information: Quick2Cart takes some personal data of users while creating the store (Title, Address, City, Region, Country, Land mark, Pincode, Contact number, E-Mail, Logo, Company name, Payment detail)"
PLG_PRIVACY_QUICK2CART_PRIVACY_CAPABILITY_USER_ORDERS_DETAIL="Order Information: To generate the invoice of the purchase some personal data of customers is needed and is taken as input from the customers which is maintained against the order. Data is stored to keep record of sales and to maintain the accounts. Also, its used for tax info according to the local tax laws (Customer Name, Email Address, VAT number, Billing and Shipping address, Land mark, City, Zip code, Country, State, Contact number and Customers IP Address (To ensure the security of site and to prevent abuse))"
PLG_PRIVACY_QUICK2CART_PRIVACY_CAPABILITY_EXTRA_FIELDS_DETAIL="Extra fields and related values: If extra field(s) are created for the products and which contains any personal data"
PLG_PRIVACY_QUICK2CART_PRIVACY_CAPABILITY_COOKIES_DETAIL="Quick2Cart uses cookies to store the cart currency of logged in user: <br/> 1. qtc_currency: Current cart currency<br/>"

PLG_PRIVACY_QUICK2CART_ERROR_PRODUCTS_WITH_ORDERS="Quick2Cart - Unable to process the request as there are order(s) (%s) against the stores owned by the user. You need to manually delete all the orders associated with all the stores owned by the user. You can delete the orders from Quick2Cart orders list view <br/> <b>NOTE :- Please make sure that the orders which you are deleting contains only the products from the stores owned by the user who has requested to delete his data</b>"
PLG_PRIVACY_QUICK2CART_ERROR_PRODUCTS_IN_STORES="Quick2Cart - Unable to process the request as there are product(s) (%s) associated with the stores owned by the user. You need to manually delete all the products associated with all the stores owned by the user. You can delete the products from Quick2Cart products list view"
PLG_PRIVACY_QUICK2CART_ERROR_STORE_OWNER="Quick2Cart - Unable to process the request as there are stores(s) (%s) associated with the user. You need to manually delete all the stores associated with the user. You can delete the stores from Quick2Cart stores list view"
PLG_PRIVACY_QUICK2CART_ERROR_PENDING_PAYOUT="Quick2Cart - Unable to process the request as there is payout of %s pending towards the user"
PLG_PRIVACY_QUICK2CART_ERROR_USER_ORDERS="Quick2Cart - Unable to process the request as there are order(s) (%s) against the user. You need to manually delete all the orders associated with the user from Quick2Cart orders view"
