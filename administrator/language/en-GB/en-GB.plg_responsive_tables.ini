PLG_RESPONSIVE_TABLES_INFO_DESC = "<h1>Responsive Tables</h1>		
		<p>Thank you for downloading and using this extension!<br />Responsive Tables is a plugin dedicated for Joomla versions 3.0 and above.</p>
		<p>With this plugin, you will be able to make responsive any HTML table in your website. This plugin offer you a great implementation:</p>
		<ul>
		<li>Doesn't break responsive layouts,</li>
		<li>Doesn't unnecessarily hide data,</li>
		<li>Still lets you compare rows.</li>
		</ul>
		<p>After installation, don't forget to publish the plugin. <br />
		On any data table in your markup, you simply need to attach the CSS class <strong>responsive rt</strong> like that: < table class='responsive rt'> and that's all !<br/>
		This plugin was successfuly tested on Apple iPhone, iPad, on Android and also on BlackBerry OS.</p> 
		
		<img height:auto;' src='../plugins/content/responsive-tables/schema.jpg' align='left' style='width:350px;margin: 0px 10px 10px 0px;' /> 
		
		<p>You like this extension? Thanks in advance for posting your positive review on <strong><a href='https://extensions.joomla.org/extension/responsive-tables/' target='_blank'>Joomla Extension Directory</a></strong>.</p>
		
		<p class='license'>Responsive Tables is release under <a target='_blank' href='http://www.gnu.org/licenses/gpl-2.0.html'>GNU/GPL v2 license.</a></p>"