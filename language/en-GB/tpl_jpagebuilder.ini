JPAGEBUILDER="JPageBuilder site template"

TPL_JPAGEBUILDER_XML_DESCRIPTION="The JPageBuilder blank template, stripped down from almost all elements that allows to build a full page layout using the JPageBuilder page builder. The template uses Bootstrap 5."

TPL_JPAGEBUILDER_SHOWHEADER_LABEL="Show header"
TPL_JPAGEBUILDER_SHOWHEADER_DESCRIPTION="If enabled, the header area will be displayed. This area is done to include the menu, you can include modules assigned to the position named 'menu'"

TPL_JPAGEBUILDER_HEADERCOLOR_LABEL="Header background color"
TPL_JPAGEBUILDER_HEADERCOLOR_DESCRIPTION="Pick the background color of the template header"

TPL_JPAGEBUILDER_HEADERTEXTCOLOR_LABEL="Header text color"
TPL_JPAGEBUILDER_HEADERTEXTCOLOR_DESCRIPTION="Pick the text color of the template header"

TPL_JPAGEBUILDER_SITELOGO_LABEL="Logo image"
TPL_JPAGEBUILDER_SITELOGO_DESCRIPTION="Pick an image for the site logo"

TPL_JPAGEBUILDER_INCLUDE_SITE_NAME_LABEL="Include site name"
TPL_JPAGEBUILDER_INCLUDE_SITE_NAME_DESCRIPTION="If enabled and if the logo image is not specified, the site name will be included as the main title of the page"

TPL_JPAGEBUILDER_STICKY_HEADER_LABEL="Sticky header"
TPL_JPAGEBUILDER_STICKY_HEADER_DESCRIPTION="Enable a sticky header that remains fixed at the top of the page while scrolling, improving navigation and user experience"

TPL_JPAGEBUILDER_MENU_BUTTON_COLOR_LABEL="Mobile menu button color"
TPL_JPAGEBUILDER_MENU_BUTTON_COLOR_DESCRIPTION="Pick the color of the mobile menu button"
TPL_JPAGEBUILDER_MENU_BUTTON_COLOR_WHITE="White button"
TPL_JPAGEBUILDER_MENU_BUTTON_COLOR_BLACK="Black button"

TPL_JPAGEBUILDER_MAINMENURIGHT_LABEL="Main menu right alignment"
TPL_JPAGEBUILDER_MAINMENURIGHT_DESCRIPTION="If enabled, the main menu will be aligned to the right side of the header"

TPL_JPAGEBUILDER_MINHEIGHT_LABEL="Min height of the body area"
TPL_JPAGEBUILDER_MINHEIGHT_DESCRIPTION="Enter the min height of the body area in px, em, rem or %"

TPL_JPAGEBUILDER_MAXWIDTH_LABEL="Max width of the page container"
TPL_JPAGEBUILDER_MAXWIDTH_DESCRIPTION="Enter the max width of the page container in px, em, rem or %. You can enter '100%' for a full page layout"

TPL_JPAGEBUILDER_CONTAINERSITEBODY_LABEL="Full-sized page container"
TPL_JPAGEBUILDER_CONTAINERSITEBODY_DESCRIPTION="If enabled, the page container will be displayed full size without margins and spaces"

TPL_JPAGEBUILDER_SHOWFOOTER_LABEL="Show footer"
TPL_JPAGEBUILDER_SHOWFOOTER_DESCRIPTION="If enabled, the footer area will be displayed. You can include modules assigned to the position named 'footer'"

TPL_JPAGEBUILDER_FOOTERCOLOR_LABEL="Footer color"
