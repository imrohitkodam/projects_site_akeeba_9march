TPL_JPAGEBUILDER_CUSTOMFAVICON_DESCRIPTION="Enable this option to use custom favicon files. If disabled, the template will use the default favicon.ico file, which you can customize, located in the template images folder (Joomla 4+: /media/templates/site/jpagebuilder/images/favicon.ico, Joomla 3: /templates/jpagebuilder/images/favicon.ico)"

TPL_JPAGEBUILDER_FAVICON_SVG_LABEL="Custom Favicon (SVG)"
TPL_JPAGEBUILDER_FAVICON_SVG_DESCRIPTION="Upload or select an SVG file to use as the main favicon"

