MOD_SPGALLERY="Smile Pack - Galeria"
SPGALLERY="Smile Pack - Galeria"
SPGALLERY_XML_DESCRIPTION="Crie galerias de fotos com nossos layouts de Alvenaria, Grade, Justificado e Apresentação de Slides. Perfeito para exibir suas imagens."
SPGALLERY_UPLOAD_FOLDER="Pasta de upload personalizada"
SPGALLERY_UPLOAD_FOLDER_DESC="Especifique o caminho relativo à raiz do seu espaço web onde os arquivos serão carregados. Utilize tags inteligentes para destinos de pastas dinâmicas. As tags inteligentes personalizadas disponíveis são '{sp module.id}', que retorna o ID do módulo."
SPGALLERY_LIMIT_FILES="Máximo de arquivos permitidos"
SPGALLERY_LIMIT_FILES_DESC="Defina o número máximo de arquivos que podem ser carregados. Use 0 para uploads ilimitados."
SPGALLERY_FREE_LIMIT_FILES_DESC="Defina o número máximo de arquivos que podem ser carregados. Na versão gratuita, você pode enviar no máximo 8 arquivos. Tenha uploads ilimitados de arquivos atualizando para a versão Pro."
SPGALLERY_MAX_FILE_SIZE="Tamanho máximo de arquivo"
SPGALLERY_MAX_FILE_SIZE_DESC="Determine o tamanho máximo (em megabytes) permitido para cada arquivo carregado. Use 0 para nenhuma restrição de tamanho. O tamanho máximo de upload do seu servidor é: %s."
SPGALLERY_LIGHTBOX="Lightbox Popup"
SPGALLERY_LIGHTBOX_DESC="Permitir a visualização de imagens em tamanho real em um pop-up lightbox ao clicar nas miniaturas. Isso aprimora a experiência do usuário, fornecendo uma maneira conveniente de visualizar imagens sem sair da página da galeria."
SPGALLERY_MODULE="Módulo como legenda"
SPGALLERY_MODULE_DESC="Selecione um módulo para exibir a imagem abaixo no pop-up lightbox, útil para conteúdo reutilizável ou anúncios."
SPGALLERY_STYLE="Estilo"
SPGALLERY_STYLE_DESC="Escolha entre os layouts de galeria mais populares, reconhecidos como padrões globais. Grade para layout uniforme com dimensões de itens personalizáveis, Alvenaria para arranjo de grade fluido com alturas variadas, Justificado para linhas com altura consistente e larguras variadas definidas por uma altura de linha alvo ou Apresentação de slides para exibição dinâmica em carrossel com navegação em miniatura."
SPGALLERY_COLUMNS="Colunas"
SPGALLERY_COLUMNS_DESC="O número de colunas para exibir os itens da galeria."
SPGALLERY_GAP="Espaço entre itens"
SPGALLERY_GAP_DESC="Ajuste o espaçamento horizontal e vertical entre os itens da galeria."
SPGALLERY_ORIGINAL_IMAGE="Imagem em tamanho real"
SPGALLERY_ORIGINAL_IMAGE_WIDTH="Redimensionar largura"
SPGALLERY_ORIGINAL_IMAGE_WIDTH_DESC="Especifique a largura em pixels para redimensionar a imagem em tamanho real. Isso aumenta a velocidade de carregamento e reduz o uso de armazenamento. Deixe em branco para manter a largura original."
SPGALLERY_ORIGINAL_IMAGE_HEIGHT="Redimensionar altura"
SPGALLERY_ORIGINAL_IMAGE_HEIGHT_DESC="Especifique a altura em pixels para redimensionar a imagem em tamanho real. Isso aumenta a velocidade de carregamento e reduz o uso de armazenamento. Deixe em branco para manter a altura original."
SPGALLERY_IMAGE_RESIZE="Redimensionar imagem"
SPGALLERY_IMAGE_RESIZE_DESC="Selecione o método que será usado para redimensionar as miniaturas na galeria.<br><br><b>Cortar</b>: Algumas partes da imagem podem ser removidas para caber na largura e altura fornecidas.<br><b> Esticar</b>: A imagem será esticada e comprimida conforme necessário para caber na largura e altura fornecidas.<br><b> Ajustar</b>: Mantenha a proporção original e ajuste as dimensões definidas pela Largura e Altura fornecidas. Isso pode fazer com que as miniaturas tenham espaços vazios nas partes superior e inferior ou esquerda e direita da imagem."
SPGALLERY_CROP="Cortar"
SPGALLERY_STRETCH="Esticar"
SPGALLERY_FIT="Ajustar"
SPGALLERY_THUMB_WIDTH_DESC="Especifique a largura da miniatura em pixels."
SPGALLERY_THUMB_HEIGHT_DESC="Especifique a altura da miniatura em pixels."
SPGALLERY_IMAGE_QUALITY="Qualidade da imagem"
SPGALLERY_IMAGE_QUALITY_DESC="Escolha a qualidade das miniaturas. A qualidade é um valor que varia entre 1 e 100. Quanto maior for a qualidade, maior será o tamanho da imagem das miniaturas."
SPGALLERY_FOLDER_TYPE="Destino do upload"
SPGALLERY_FOLDER_TYPE_DESC="Por padrão, as imagens são carregadas no diretório /media/spgallery/MODULE_ID, onde MODULE_ID é o ID deste módulo. Para maior segurança, um prefixo aleatório é anexado a cada nome de arquivo. Opte pela opção ‘Personalizado’ para especificar sua pasta de destino preferida."
SPGALLERY_FREE_FOLDER_TYPE_DESC="Especifique a pasta de destino onde as imagens enviadas serão salvas. Por padrão, as imagens são salvas no diretório /media/spgallery/MODULE_ID, onde MODULE_ID é o ID do módulo atual. Você também pode definir um diretório personalizado."
SPGALLERY_ORDERING="Ordenação dos Itens"
SPGALLERY_ORDERING_DESC="Por padrão, os itens da galeria são exibidos na mesma ordem em que aparecem no Gallery Manager, proporcionando a flexibilidade de reordenar manualmente os itens usando a funcionalidade de arrastar e soltar. Alternativamente, você pode optar por exibir os itens em ordem alfabética ou aleatória para criar uma exibição diversificada e dinâmica."
SPGALLERY_DEFAULT="Padrão"
SPGALLERY_ALPHABETICAL="Alfabético"
SPGALLERY_REVERSE_ALPHABETICAL="Ordem alfabética invertida"
SPGALLERY_RANDOM="Aleatório"
SPGALLERY_JUSTIFIED_ITEM_HEIGHT_DESC="Defina a altura da miniatura e a altura aproximada de cada item da galeria."
SPGALLERY_ITEM_WIDTH="Largura do item"
SPGALLERY_ITEM_HEIGHT="Altura do item"
SPGALLERY_ROW_TARGET_HEIGHT="Altura desejada da linha"
SPGALLERY_SLIDESHOW="Slideshow"
SPGALLERY_SLIDES_PER_VIEW="Slides por visualização"
SPGALLERY_SLIDES_PER_VIEW_DESC="Especifique quantos slides serão exibidos simultaneamente. Por exemplo, insira 1 para um slide, 1,5 para um slide e meio ou 2 para dois slides."
SPGALLERY_SPACE_BETWEEN_SLIDES="Espaço entre os slides"
SPGALLERY_SPACE_BETWEEN_SLIDES_DESC="Especifique o espaçamento entre os slides em pixels."
SPGALLERY_INFINITE_LOOP="Loop infinito"
SPGALLERY_INFINITE_LOOP_DESC="Ative para fazer um loop contínuo do último slide de volta ao primeiro. Isso evita interrupções na experiência de visualização, garantindo envolvimento contínuo com seu conteúdo."
SPGALLERY_KEYBOARD_CONTROL="Controle do Teclado"
SPGALLERY_KEYBOARD_CONTROL_DESC="Ative a navegação pelo teclado para a apresentação de slides. Isso permite que os usuários naveguem pela apresentação de slides usando as setas do teclado, fornecendo um método alternativo e conveniente de interação."
SPGALLERY_AUTOPLAY="Reprodução automática"
SPGALLERY_AUTOPLAY_DESC="Ative para reproduzir automaticamente a apresentação de slides. Esse recurso oferece uma experiência de visualização sem usar as mãos para os usuários, aumentando o envolvimento com seu conteúdo."
SPGALLERY_AUTOPLAY_PROGRESS="Progresso da reprodução automática"
SPGALLERY_AUTOPLAY_PROGRESS_DESC="Ativar esta configuração exibirá uma barra de progresso circular no canto inferior direito de cada controle deslizante, indicando quanto tempo até o próximo slide aparecer."
SPGALLERY_SHOW_THUMBNAILS_DESC="Habilite esta configuração para exibir miniaturas abaixo da apresentação de slides."
SPGALLERY_THUMBNAILS_ARROWS="Setas de navegação"
SPGALLERY_THUMBNAILS_ARROWS_DESC="Escolha se deseja mostrar as setas de navegação no slider de miniaturas."
SPGALLERY_NAV_CONTROLS="Controles de navegação"
SPGALLERY_NAV_CONTROLS_DESC="Selecione o tipo de controles de navegação.<br><br>Setas: Mostram as setas anterior e seguinte na apresentação de slides..<br>Pontos: Exibem pontos abaixo da apresentação de slides para seleção de slides.<br>Setas + pontos: Mostram a paginação de setas e pontos.."
SPGALLERY_ARROWS="Setas"
SPGALLERY_DOTS="Pontos"
SPGALLERY_ARROWS_DOTS="Setas + Pontos"
SPGALLERY_SLIDESHOW_THEME_COLOR="Cor do tema"
SPGALLERY_SLIDESHOW_THEME_COLOR_DESC="Defina o esquema de cores base da apresentação de slides."
