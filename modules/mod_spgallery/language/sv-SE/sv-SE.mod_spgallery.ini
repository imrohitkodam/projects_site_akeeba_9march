MOD_SPGALLERY="Smile Pack - Gallery"
SPGALLERY="Smile Pack - Gallery"
SPGALLERY_XML_DESCRIPTION="Skapa fotogallerier med våra layouter Masonry, Grid, Justified och Slideshow. Perfekt för att visa upp dina bilder."
SPGALLERY_UPLOAD_FOLDER="Anpassad uppladdningsmapp"
SPGALLERY_UPLOAD_FOLDER_DESC="Ange sökvägen i förhållande till ditt webbutrymmes rot där filerna ska laddas upp. Använd smarta taggar för dynamiska mappdestinationer. De anpassade smarta taggarna som är tillgängliga är '{sp module.id}', som returnerar modul-ID:t."
SPGALLERY_LIMIT_FILES="Maximalt tillåtna filer"
SPGALLERY_LIMIT_FILES_DESC="Ange det maximala antalet filer som kan laddas upp. Använd 0 för obegränsade uppladdningar."
SPGALLERY_FREE_LIMIT_FILES_DESC="Ställ in det maximala antalet filer som kan laddas upp. I gratisversionen kan du ladda upp maximalt 8 filer. Lås upp obegränsade filuppladdningar genom att uppgradera till Pro-versionen."
SPGALLERY_MAX_FILE_SIZE="Filstorleksgräns"
SPGALLERY_MAX_FILE_SIZE_DESC="Bestäm den maximala storleken (i megabyte) som tillåts för varje uppladdad fil. Använd 0 för ingen storleksbegränsning. Din servers maximala uppladdningsstorlek är: %s."
SPGALLERY_LIGHTBOX="Lightbox Popup"
SPGALLERY_LIGHTBOX_DESC="Tillåt visning av bilder i full storlek i en popup-bild av en lightbox när du klickar på miniatyrbilder. Detta förbättrar användarupplevelsen genom att erbjuda ett bekvämt sätt att förhandsgranska bilder utan att behöva navigera bort från gallerisidan."
SPGALLERY_MODULE="Modul som bildtext"
SPGALLERY_MODULE_DESC="Välj en modul som ska visas nedanstående bild i lightbox-popupfönstret, användbart för återanvändbart innehåll eller annonser."
SPGALLERY_STYLE="Stil"
SPGALLERY_STYLE_DESC="Välj bland de mest populära gallerilayouterna, erkända som globala standarder. Rutnät för enhetlig layout med anpassningsbara objektdimensioner, Murverk för flytande rutnätsarrangemang med varierande höjder, Justerat för rader med konsekvent höjd och varierande bredder definierade av en målradhöjd eller Bildspel för dynamisk karusellvisning med miniatyrnavigering."
SPGALLERY_COLUMNS="Kolumner"
SPGALLERY_COLUMNS_DESC="Antalet kolumner som galleriobjekten ska visas i."
SPGALLERY_GAP="Objektmellanrum"
SPGALLERY_GAP_DESC="Justera det horisontella och vertikala avståndet mellan galleriobjekt."
SPGALLERY_ORIGINAL_IMAGE="Bild i full storlek"
SPGALLERY_ORIGINAL_IMAGE_WIDTH="Ändra bredd"
SPGALLERY_ORIGINAL_IMAGE_WIDTH_DESC="Ange bredden i pixlar för att ändra storlek på bilden i full storlek. Detta förbättrar laddningshastigheten och minskar lagringsanvändningen. Lämna tomt för att bibehålla originalbredden."
SPGALLERY_ORIGINAL_IMAGE_HEIGHT="Ändra höjd"
SPGALLERY_ORIGINAL_IMAGE_HEIGHT_DESC="Ange höjden i pixlar för att ändra storleken på bilden i full storlek. Detta förbättrar laddningshastigheten och minskar lagringsanvändningen. Lämna tomt för att bibehålla originalhöjden."
SPGALLERY_IMAGE_RESIZE="Ändra bildstorlek"
SPGALLERY_IMAGE_RESIZE_DESC="Välj den metod som ska användas för att ändra storlek på miniatyrbilderna i galleriet.<br><br><b>Beskär</b>: Vissa delar av bilden kan komma att tas bort för att passa den angivna bredden och höjden. <br><b>Sträck</b>: Bilden kommer att sträckas och pressas ihop efter behov för att passa den angivna bredden och höjden. <br><b>Passa in</b>: Behåll det ursprungliga bildförhållandet och anpassa måtten som definieras av den angivna bredden och höjden. Detta kan göra att miniatyrerna får tomt utrymme antingen i bildens övre och nedre del eller vänster och höger."
SPGALLERY_CROP="Beskär"
SPGALLERY_STRETCH="Sträck"
SPGALLERY_FIT="Passa in"
SPGALLERY_THUMB_WIDTH_DESC="Ange bredden i pixlar för miniatyrbilden."
SPGALLERY_THUMB_HEIGHT_DESC="Ange höjden i pixlar för miniatyrbilden."
SPGALLERY_IMAGE_QUALITY="Bildkvalitet"
SPGALLERY_IMAGE_QUALITY_DESC="Välj kvalitet för miniatyrbilderna. Kvaliteten är ett värde som varierar mellan 1 och 100. Ju högre kvalitet, desto större blir bildstorleken på miniatyrbilderna."
SPGALLERY_FOLDER_TYPE="Uppladdningsdestination"
SPGALLERY_FOLDER_TYPE_DESC="Som standard laddas bilder upp till katalogen /media/spgallery/MODULE_ID, där MODULE_ID är ID:t för den här modulen. För ökad säkerhet läggs ett slumpmässigt prefix till varje filnamn. Välj alternativet 'Anpassad' för att ange din önskade målmapp."
SPGALLERY_FREE_FOLDER_TYPE_DESC="Ange destinationsmappen där de uppladdade bilderna ska sparas. Som standard sparas bilder i katalogen /media/spgallery/MODULE_ID, där MODULE_ID är det aktuella modul-ID:t. Du kan också definiera en anpassad katalog."
SPGALLERY_ORDERING="Objektsortering"
SPGALLERY_ORDERING_DESC="Som standard visas galleriobjekt i samma ordning som de visas i Gallerihanteraren, vilket ger flexibiliteten att manuellt ändra ordningen på objekt med hjälp av dra-och-släpp-funktionen. Alternativt kan du välja att visa objekten alfabetiskt eller i slumpmässig ordning för att skapa en mångsidig och dynamisk visning."
SPGALLERY_DEFAULT="Standard"
SPGALLERY_ALPHABETICAL="Alfabetisk"
SPGALLERY_REVERSE_ALPHABETICAL="Omvänd alfabetisk"
SPGALLERY_RANDOM="Slumpmässig"
SPGALLERY_JUSTIFIED_ITEM_HEIGHT_DESC="Ange höjden på miniatyrbilden och den ungefärliga höjden på varje galleriobjekt."
SPGALLERY_ITEM_WIDTH="Objektbredd"
SPGALLERY_ITEM_HEIGHT="Objekthöjd"
SPGALLERY_ROW_TARGET_HEIGHT="Radens målhöjd"
SPGALLERY_SLIDESHOW="Bildspel"
SPGALLERY_SLIDES_PER_VIEW="Bilder per vy"
SPGALLERY_SLIDES_PER_VIEW_DESC="Ange hur många bilder som ska visas samtidigt. Ange till exempel 1 för en bild, 1,5 för en och en halv bild eller 2 för två bilder."
SPGALLERY_SPACE_BETWEEN_SLIDES="Avstånd mellan bilder"
SPGALLERY_SPACE_BETWEEN_SLIDES_DESC="Ange avståndet mellan bilderna i pixlar."
SPGALLERY_INFINITE_LOOP="Oändlig loop"
SPGALLERY_INFINITE_LOOP_DESC="Aktivera sömlös loopning från den sista bilden tillbaka till den första. Detta förhindrar avbrott i visningsupplevelsen och säkerställer kontinuerligt engagemang med ditt innehåll."
SPGALLERY_KEYBOARD_CONTROL="Tangentbordskontroll"
SPGALLERY_KEYBOARD_CONTROL_DESC="Aktivera tangentbordsnavigering för bildspelet. Detta gör det möjligt för användare att navigera i bildspelet med hjälp av tangentbordspilarna, vilket ger en alternativ och bekväm metod för interaktion."
SPGALLERY_AUTOPLAY="Autospela"
SPGALLERY_AUTOPLAY_DESC="Aktivera för att automatiskt spela upp bildspelet. Den här funktionen ger användarna en handsfree-upplevelse, vilket ökar engagemanget med ditt innehåll."
SPGALLERY_AUTOPLAY_PROGRESS="Autospelningsförlopp"
SPGALLERY_AUTOPLAY_PROGRESS_DESC="Om du aktiverar den här inställningen visas en cirkulär förloppsindikator längst ner till höger om varje reglage som anger hur lång tid det tar innan nästa bild visas."
SPGALLERY_SHOW_THUMBNAILS_DESC="Aktivera den här inställningen för att visa miniatyrbilder under bildspelet."
SPGALLERY_THUMBNAILS_ARROWS="Navigeringspilar"
SPGALLERY_THUMBNAILS_ARROWS_DESC="Välj om navigeringspilar ska visas i miniatyrbildsreglaget."
SPGALLERY_NAV_CONTROLS="Navigeringsreglage"
SPGALLERY_NAV_CONTROLS_DESC="Välj typ av navigeringskontroller.<br><br>Pilar: Visar föregående och nästa pilar i bildspelet.<br>Punkter: Visa punkter under bildspelet för att välja bild.<br>Pilar + Punkter: Visar paginering med både pilar och punkter."
SPGALLERY_ARROWS="Pilar"
SPGALLERY_DOTS="Punkter"
SPGALLERY_ARROWS_DOTS="Pilar + Punkter"
SPGALLERY_SLIDESHOW_THEME_COLOR="Temafärg"
SPGALLERY_SLIDESHOW_THEME_COLOR_DESC="Definiera basfärgschemat för bildspelet."
SPGALLERY_AUTOPLAY_DELAY="Fördröjning autospelning"
SPGALLERY_AUTOPLAY_DELAY_DESC="Ställ in fördröjningen för autouppspelning tills nästa bild visas, i millisekunder."
SPGALLERY_TRANSITION_EFFECT="Övergångseffekt"
SPGALLERY_TRANSITION_EFFECT_DESC="Välj övergångseffekt mellan bilder. Om bildspelet är konfigurerat för att visa 2 eller fler bilder per vy används övergången 'Bild' som standard."
SPGALLERY_SLIDE="Glida"
SPGALLERY_FADE="Tona"
SPGALLERY_CUBE="Kub"
SPGALLERY_COVERFLOW="Coverflow"
SPGALLERY_FLIP="Vänd"
SPGALLERY_THUMBNAILS="Minibilder"
SPGALLERY_WATERMARK_TEXT_PRESET="Vattenstämpeltext"
SPGALLERY_WATERMARK_TEXT_PRESET_DESC="Ställ in en vattenstämpeltext. Du kan antingen välja ett fördefinierat alternativ eller ange en anpassad text."
SPGALLERY_SITE_NAME="Webbplatsens namn"
SPGALLERY_SITE_URL="Webbplatsens URL"
SPGALLERY_WATERMARK_TEXT_CUSTOM="Anpassad text"
SPGALLERY_WATERMARK_TYPE_DESC="Välj om du vill använda en vattenstämpel på uppladdade bilder. Detta hjälper till att skydda dina bilder och gör det svårare för andra att använda dem utan tillstånd."
SPGALLERY_WATERMARK_TEXT_DESC="Ange texten som ska användas som vattenstämpel. Du kan också använda smarta taggar.<br><br>Filer Smarta taggar:<br>{file.filename}: myfile<br>{file.basename}: myfile.png"
SPGALLERY_WATERMARK_TEXT_COLOR_DESC="Välj färg på vattenstämpelns text."
SPGALLERY_WATERMARK_FONT_SIZE_DESC="Välj teckenstorlek för vattenstämpeln, angiven i pixlar. Den justeras dynamiskt för att passa galleribildens dimensioner. Till exempel passar en teckenstorlek på 50 pixlar stora bilder som 1024x800 pixlar. För mindre bilder som 50x50 pixlar anpassas teckenstorleken för att säkerställa optimal synlighet."
SPGALLERY_WATERMARK_IMAGE_DESC="Välj vattenstämpelbilden. Den justeras baserat på galleribildens dimensioner. Om vattenstämpeln till exempel är 800x800 pixlar passar den korrekt på en galleribild på 1024x1024. If the gallery image is smaller, like 500x500 pixels, the watermark scales down proportionally to fit."
SPGALLERY_WATERMARK_POSITION="Placering"
SPGALLERY_WATERMARK_POSITION_DESC="Välj vattenstämpelns position på bilden."
SPGALLERY_WATERMARK_OPACITY="Genomskinlighet"
SPGALLERY_WATERMARK_OPACITY_DESC="Justera vattenstämpelns genomskinlighet. Detta hjälper till att hitta rätt balans mellan vattenstämpelns synlighet och subtilitet."
SPGALLERY_WATERMARK_ROTATION="Rotation"
SPGALLERY_WATERMARK_ROTATION_DESC="Rotera vattenmärkesbilden medurs genom att ange vinkeln i grader."
SPGALLERY_WATERMARK_APPLY_ON_THUMBNAILS="Använd på miniatyrer"
SPGALLERY_WATERMARK_APPLY_ON_THUMBNAILS_DESC="Välj om vattenstämpeln ska användas på miniatyrbilder."
SPGALLERY_FILTERING_TAGS="Filtrering av taggar"
SPGALLERY_TAGS_POSITION="Taggposition"
SPGALLERY_TAGS_POSITION_DESC="Välj om filtreringstaggar ska visas i galleriet. Detta ger användarna ett intuitivt sätt att filtrera galleriobjekt efter taggar, vilket förbättrar navigering och innehållsupptäckt."
SPGALLERY_ABOVE_GALLERY_ITEMS="Ovanför galleriobjekt"
SPGALLERY_BELOW_GALLERY_ITEMS="Nedanför galleriobjekt"
SPGALLERY_TAGS_SORT="Sortera taggar"
SPGALLERY_TAGS_SORT_DESC="Välj sorteringsmetod för dina taggar. Som standard visas taggar i den ordning de visas i Tagg-komponenten, vilket möjliggör effektiv omsortering."
SPGALLERY_ALL_TAGS_ITEM_LABEL="Alla taggar Etikett"
SPGALLERY_ALL_TAGS_ITEM_LABEL_DESC="Ange en etikett för ett 'Alla'-objekt i början av taggfilterlistan för att visa alla galleriobjekt. Lämna tomt för att inaktivera 'Alla'-objektet. Du kan göra detta flerspråkigt genom att ange det som en översättningssträng."
SPGALLERY_TAGS_MOBILE="Taggar på mobil"
SPGALLERY_TAGS_MOBILE_DESC="Välj om du vill visa taggarna på mobila enheter, få dem att visas som en rullgardinsmeny eller inaktivera dem."
SPGALLERY_TAGS_TEXT_COLOR="Textfärg"
SPGALLERY_TAGS_TEXT_COLOR_DESC="Ange färgen på taggarnas text."
SPGALLERY_TAGS_TEXT_COLOR_HOVER="Textfärg - Pekning"
SPGALLERY_TAGS_TEXT_COLOR_HOVER_DESC="Ställ in textfärgen när du håller muspekaren över en tagg."
SPGALLERY_TAGS_BG_COLOR_HOVER="Bakgrundsfärg - Pekning"
SPGALLERY_TAGS_BG_COLOR_HOVER_DESC="Ställ in bakgrundsfärgen när du håller muspekaren över en tagg."
SPGALLERY_SHOW="Visa"
SPGALLERY_SHOW_AS_DROPDOWN="Visa som rullgardinsmeny"
COM_MODULES_GALLERY_FIELDSET_LABEL="Galleri"
COM_MODULES_WATERMARK_IMAGES_FIELDSET_LABEL="Vattenstämpla bilder"
COM_MODULES_FILTERING_TAGS_FIELDSET_LABEL="Filtrering av taggar"
COM_MODULES_UPLOAD_FIELDSET_LABEL="Ladda upp"
SPGALLERY_WATERMARK_FREE_TYPE_DESC="Välj om du vill använda en vattenstämpel som text eller bild på uppladdade bilder. Detta hjälper till att skydda dina bilder och gör det svårare för andra att använda dem utan tillstånd."
MOD_SPGALLERY_LIMIT_FILES_INVALID="Inställningsvärdet för filgränsen måste vara mellan 1 och 8."
