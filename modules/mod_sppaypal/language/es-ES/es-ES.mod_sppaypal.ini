SPPAYPAL_BUTTON_LAYOUT="Diseño del botón"
SPPAYPAL_BUTTON_LAYOUT_DESC="Seleccione cómo aparecerán sus botones de PayPal cuando tenga múltiples opciones de pago. Vertical permite apilar hasta cuatro botones, mientras que Horizontal permite apilar dos botones uno al lado del otro."
SPPAYPAL_COLOR="Color del botón"
SPPAYPAL_COLOR_DESC="Elija el color de su botón de PayPal. El dorado es la opción más reconocible, pero también puedes seleccionar Azul, Plata, Negro o Blanco para que combine con el diseño de tu sitio web."
SPPAYPAL_ROUNDNED_CORNERS="Estilo de esquina"
SPPAYPAL_ROUNDNED_CORNERS_DESC="Elija qué tan redondeadas desea que sean las esquinas de su botón de PayPal."
SPPAYPAL_TAGLINE="Mostrar lema del botón"
SPPAYPAL_TAGLINE_DESC="Elija si desea mostrar el texto del lema \"La forma más segura y fácil de pagar\" debajo del botón. Esto brinda a los usuarios confianza y tranquilidad adicionales, pero es posible que prefiera una apariencia más limpia ocultándolo."
SPPAYPAL_PRODUCT_TYPE="Tipo de producto"
SPPAYPAL_PRODUCT_TYPE_DESC="Selecciona el tipo de producto que estás vendiendo. Seleccione \"Físico\" para productos físicos, \"Digital\" para productos digitales y \"Servicio\" para servicios."
SPPAYPAL_PHYSICAL="Físico"
SPPAYPAL_DIGITAL="Digital"
SPPAYPAL_SERVICE="Servicio"
SPPAYPAL_TESTMODE="Modo de prueba"
SPPAYPAL_TESTMODE_DESC="Habilite esta opción para probar el botón de PayPal en modo sandbox. También debe configurar su ID de cliente y secreto de la zona de pruebas de PayPal en Configuración global > Paquete Smile > Claves > sección PayPal."
SPPAYPAL_TESTMODE_WARNING="Advertencia: el modo de prueba está habilitado. Los pagos se procesarán en el entorno sandbox de PayPal."
SPPAYPAL_TAX_RATE="Tasa de impuesto"
SPPAYPAL_TAX_RATE_DESC="Establezca la tasa de impuestos para el producto que está vendiendo. <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Admite etiquetas inteligentes</a>."
SPPAYPAL_SHIPPING_COST="Costo de envío"
SPPAYPAL_SHIPPING_COST_DESC="Establezca el costo de envío del producto que estás vendiendo. <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Admite etiquetas inteligentes</a>."
SPPAYPAL_SHOW_SHIPPING_ADDRESS="Mostrar dirección de envío"
SPPAYPAL_SHOW_SHIPPING_ADDRESS_DESC="Habilite esta opción para mostrar la dirección de envío en la página de pago de PayPal."
SPPAYPAL_INCLUDE_PAYMENT_METHODS="Incluir métodos de pago"
SPPAYPAL_INCLUDE_PAYMENT_METHODS_DESC="Seleccionar los métodos de pago que estarán disponibles para el usuario."
SPPAYPAL_AUTO_DETECT="Detección automática"
SPPAYPAL_CARD="Tarjeta"
SPPAYPAL_PAY_LATER="Paga después"
SPPAYPAL_PAYPAL_CREDIT="Crédito PayPal"
SPPAYPAL_EXCLUDE_PAYMENT_METHODS="Excluir métodos de pago"
SPPAYPAL_EXCLUDE_PAYMENT_METHODS_DESC="Seleccionar los métodos de pago que estarán excluídos para el usuario."
SPPAYPAL_PAYMENT_METHODS="Métodos de pago"
SPPAYPAL_PAYMENT_METHODS_DESC="De forma predeterminada, PayPal detecta automáticamente los métodos de pago disponibles según el país del comprador, las opciones de pago preferidas y el tipo de dispositivo. Esto da como resultado una combinación única de botones de pago disponibles para cada visitante. Para evitar que se muestren ciertos botones, elija \"Personalizado\" para incluir o excluir fuentes de financiación específicas."
SPPAYPAL_MAX_WIDTH="Ancho del botón"
SPPAYPAL_MAX_WIDTH_DESC="De forma predeterminada, el botón de PayPal se expandirá a todo el ancho de su contenedor. Aquí puedes establecer un ancho máximo en píxeles si prefieres un botón más pequeño."
SPPAYPAL_SUCCESS_MESSAGE="Mensaje"
SPPAYPAL_SUCCESS_MESSAGE_DESC="Muestre un mensaje personalizado a los usuarios directamente encima de los botones de pago después de que completen exitosamente su pago. Utilice etiquetas inteligentes para personalizarlo."
SPPAYPAL_SUCCESS_MESSAGE_HINT="Gracias por su compra. Su pago ha sido procesado exitosamente."
SPPAYPAL_SMART_TAGS="Personalice el mensaje de éxito o pase datos para redirigir la URL utilizando las siguientes etiquetas inteligentes basadas en transacciones: <br><br><b>{this.product_name}</b> inserta el nombre del producto. Por ejemplo: Gracias por comprar {this.product_name}<br><b>{this.billing_amount}</b> muestra el monto de facturación. Por ejemplo: Su pago de {this.billing_amount} {this.currency} está confirmado.<br><b>{this.currency}</b> muestra la moneda utilizada.<br><b>{this.payment_source}</b> muestra la fuente de pago de PayPal.<br><b>{this.order_id}</b> muestra el ID del pedido de PayPal.<br><b>{ this.payer_id}</b> muestra el ID del pagador de PayPal.<br><b>{this.payment_id}</b> muestra el ID de pago de PayPal.<br><b>{this.subscription_id}</b> muestra el ID de suscripción de PayPal."
SPPAYPAL_SMART_TAGS_GLOBAL="Vaya más allá de los detalles de la transacción con <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Etiquetas Inteligentes</a> globales para generar datos, incluida la fecha y hora actuales, la IP del visitante, el dispositivo o el país, la URL de la página actual, el título, la ID del usuario que inició sesión actualmente, el nombre o el correo electrónico y una gran cantidad de otra información sin necesidad de conocimientos de programación."
