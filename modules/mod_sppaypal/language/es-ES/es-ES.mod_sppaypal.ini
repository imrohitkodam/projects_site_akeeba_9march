MOD_SPPAYPAL="Smile Pack - Botón de PayPal"
SPPAYPAL="Smile Pack - Botón de PayPal"
SPPAYPAL_XML_DESCRIPTION="Comience a aceptar pagos, donaciones y suscripciones con los botones de PayPal. No se requieren conocimientos técnicos."
SPPAYPAL_BILLING_AMOUNT="Monto de facturación"
SPPAYPAL_BILLING_AMOUNT_DESC="Establezca la cantidad del producto o servicio que estás vendiendo. <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Admite etiquetas inteligentes</a>."
SPPAYPAL_ITEM_NAME="Nombre del artículo"
SPPAYPAL_ITEM_NAME_DESC="Establezca el nombre del artículo que está vendiendo. <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Admite etiquetas inteligentes</a>."
SPPAYPAL_CURRENCY="Moneda"
SPPAYPAL_CURRENCY_DESC="Seleccione la moneda en la que sus usuarios pagarán por los productos que proporciona."
SPPAYPAL_BILLING_DETAILS="Detalles del producto"
SPPAYPAL_BILLING_CYCLE="Ciclo de facturación"
SPPAYPAL_BILLING_CYCLE_DESC="Elija con qué frecuencia se les cobrará a los usuarios. Seleccione \"Única vez\" para un pago único o elija un cronograma recurrente como \"Mensual\" o \"Anual\". 'Personalizado' le permite establecer una duración específica en días para las suscripciones."
SPPAYPAL_BILLING_CYCLE_DESC_FREE="A los usuarios se les cobrará una vez por un pago único. Actualice a Pro y desbloquee opciones de facturación recurrente: diaria, semanal, mensual y anual. Programe pagos que se ajusten perfectamente a sus necesidades y agilice su proceso de ventas."
SPPAYPAL_RECURRING_INTERVAL="Ciclo de facturación recurrente"
SPPAYPAL_RECURRING_INTERVAL_DESC="Establece la duración de la suscripción en días."
SPPAYPAL_LANGUAGE="Idioma"
SPPAYPAL_LANGUAGE_DESC="Establezca el idioma del botón de PayPal. Seleccione 'Usar idioma del navegador del visitante' para usar el idioma del navegador del visitante, 'Usar idioma del sitio' para usar el idioma de su sitio o seleccione un idioma específico."
SPPAYPAL_SUCCESS_URL="URL"
SPPAYPAL_SUCCESS_URL_DESC="Ingrese la dirección web a la que se enviará a los usuarios después de completar su pago. Utilice etiquetas inteligentes para pasar datos a la URL de éxito."
SPPAYPAL_OTHER_SETTINGS="Otros ajustes"
