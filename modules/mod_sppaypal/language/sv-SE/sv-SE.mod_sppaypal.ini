SPPAYPAL_CURRENCY="Valuta"
SPPAYPAL_CURRENCY_DESC="Välj den valuta som dina användare ska betala för de produkter du tillhandahåller."
SPPAYPAL_BILLING_DETAILS="Produktinformation"
SPPAYPAL_BILLING_CYCLE="Faktureringscykel"
SPPAYPAL_BILLING_CYCLE_DESC="Välj hur ofta användare ska debiteras. Välj 'Engångsbetalning' för en engångsbetalning, eller välj ett återkommande schema som 'Månadsvis' eller 'Årsvis'. Med 'Anpassad' kan du ange en specifik varaktighet i dagar för prenumerationer."
SPPAYPAL_BILLING_CYCLE_DESC_FREE="Användarna debiteras en gång för en engångsbetalning. Uppgradera till Pro och lås upp återkommande faktureringsalternativ: Dagligen, Veckovis, Månadsvis och Årligen. Schemalägg betalningar som perfekt matchar dina behov och effektivisera din säljprocess."
SPPAYPAL_RECURRING_INTERVAL="Återkommande faktureringscykel"
