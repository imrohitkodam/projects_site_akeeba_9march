SPPAYPAL_COLOR="Knapp-färg"
SPPAYPAL_COLOR_DESC="Välj färg på din PayPal-knapp. Guld är det mest igenkännliga alternativet, men du kan också välja blått, silver, svart eller vitt för att matcha din webbplats design."
SPPAYPAL_ROUNDNED_CORNERS="Hörnstil"
SPPAYPAL_ROUNDNED_CORNERS_DESC="Välj hur rundade du vill att hörnen på din PayPal-knapp ska vara."
SPPAYPAL_TAGLINE="Visa knappens slogan"
SPPAYPAL_TAGLINE_DESC="Välj om du vill visa slogan-texten 'Det säkrare och enklare sättet att betala' under knappen. Detta ger användarna ytterligare förtroende och trygghet, men du kanske föredrar ett renare utseende genom att dölja det."
SPPAYPAL_PRODUCT_TYPE="Produkttyp"
SPPAYPAL_PRODUCT_TYPE_DESC="Välj vilken typ av produkt du säljer. Välj 'Fysisk' för fysiska produkter, 'Digital' för digitala produkter och 'Tjänst' för tjänster."
