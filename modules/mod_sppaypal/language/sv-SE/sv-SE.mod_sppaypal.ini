SPPAYPAL_TESTMODE="Testläge"
SPPAYPAL_TESTMODE_DESC="Aktivera det här alternativet för att testa PayPal-knappen i sandboxläge. Du måste också konfigurera ditt PayPal-sandbox-klient-ID och din hemlighet under Global konfiguration > Smile Pack > Nycklar > PayPal-sektionen."
SPPAYPAL_TESTMODE_WARNING="Varning: Testläget är aktiverat. Betalningar kommer att behandlas i PayPals sandbox-miljö."
SPPAYPAL_TAX_RATE="Skattesats"
SPPAYPAL_TAX_RATE_DESC="Ställ in momssatsen för den produkt du säljer. Stöder <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Smarta taggar</a>."
SPPAYPAL_SHIPPING_COST="Fraktkostnad"
SPPAYPAL_SHIPPING_COST_DESC="Ställ in fraktkostnaden för den produkt du säljer. Stöder <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Smarta taggar</a>."
SPPAYPAL_SHOW_SHIPPING_ADDRESS="Visa leveransadress"
SPPAYPAL_SHOW_SHIPPING_ADDRESS_DESC="Aktivera det här alternativet för att visa leveransadressen på PayPals kassasida."
SPPAYPAL_INCLUDE_PAYMENT_METHODS="Inkludera betalningsmetoder"
SPPAYPAL_INCLUDE_PAYMENT_METHODS_DESC="Välj de betalningsmetoder som ska vara tillgängliga för användaren."
