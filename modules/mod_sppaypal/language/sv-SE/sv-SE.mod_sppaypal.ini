SPPAYPAL_PAY_LATER="Betala senare"
SPPAYPAL_PAYPAL_CREDIT="PayPal Kredit"
SPPAYPAL_EXCLUDE_PAYMENT_METHODS="Uteslut betalningsmetoder"
SPPAYPAL_EXCLUDE_PAYMENT_METHODS_DESC="Välj de betalningsmetoder som ska inaktiveras för användaren."
SPPAYPAL_PAYMENT_METHODS="Betalningsmetoder"
SPPAYPAL_PAYMENT_METHODS_DESC="Som standard identifierar PayPal automatiskt tillgängliga betalningsmetoder baserat på köparens land, föredragna betalningsalternativ och enhetstyp. Detta resulterar i en unik kombination av betalningsknappar som är tillgängliga för varje besökare. För att förhindra att vissa knappar visas, välj 'Anpassad' för att inkludera eller exkludera specifika finansieringskällor."
SPPAYPAL_MAX_WIDTH="Knapp-bredd"
SPPAYPAL_MAX_WIDTH_DESC="Som standard expanderas PayPal-knappen till hela behållarens bredd. Här kan du ställa in en maximal bredd i pixlar om du föredrar en mindre knapp."
SPPAYPAL_SUCCESS_MESSAGE="Meddelande"
SPPAYPAL_SUCCESS_MESSAGE_DESC="Visa ett anpassat meddelande till användarna direkt ovanför betalningsknapparna efter att de har slutfört sin betalning. Använd smarta taggar för att anpassa det."
SPPAYPAL_SUCCESS_MESSAGE_HINT="Tack för ditt köp. Din betalning har behandlats."
SPPAYPAL_SMART_TAGS="Anpassa meddelandet om framgång eller skicka data till omdirigerings-URL med hjälp av följande transaktionsbaserade smarta taggar: <br><br><b>{this.product_name}</b> infogar produktnamnet. Ex.: Tack för att du köpt {this.product_name}<br><b>{this.billing_amount}</b> visar köpebeloppet.. Ex.: Din betalning för {this.billing_amount} {this.currency} är godkänd<br><b>{this.currency}</b> visar valutan som använts.<br><b>{this.payment_source}</b> visat PayPal betalkälla.<br><b>{this.order_id}</b> visar PayPal beställnings-ID.<br><b>{this.payer_id}</b> visar PayPal betalar-ID.<br><b>{this.payment_id}</b> visar PayPal betalnings-ID.<br><b>{this.subscription_id}</b> visar PayPal prenumerations-ID."
SPPAYPAL_SMART_TAGS_GLOBAL="Gå bortom transaktionsdetaljer med globala <a href=\"https://www.tassos.gr/joomla-extensions/smile-pack/docs/smart-tags-sp\" target=\"blank\">Smarta taggar</a> för att mata ut data, inklusive aktuellt datum och tid, besökarens IP-adress, enhet eller land, aktuell sid-URL, titel, för närvarande inloggat användar-ID, namn eller e-postadress och en myriad av annan information utan någon programmeringsexpertis."
