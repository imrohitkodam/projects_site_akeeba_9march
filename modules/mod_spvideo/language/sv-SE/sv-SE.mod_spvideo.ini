SPVIDEO_AUTOPLAY="Autospela"
SPVIDEO_AUTOPLAY_DESC="Välj om videon ska spelas upp automatiskt när spelaren laddas. Observera att moderna webbläsare har strängare policyer för automatisk uppspelning, så det kan vara nödvändigt att aktivera alternativet Ljud av för att automatisk uppspelning ska fungera korrekt."
