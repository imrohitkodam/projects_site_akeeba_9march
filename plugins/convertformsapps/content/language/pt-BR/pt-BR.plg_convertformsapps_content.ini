PLG_CONVERTFORMSAPPS_CONTENT_ALIAS="Conteúdo"
PLG_CONVERTFORMSAPPS_CONTENT="Convert Forms - Apps - Conteúdo"
PLG_CONVERTFORMSAPPS_CONTENT_DESC="Crie formulários personalizados para envio de artigos no Joomla."
PLG_CONVERTFORMSAPPS_CONTENT_ACTION_CREATEARTICLE="Criar Artigo"
PLG_CONVERTFORMSAPPS_CONTENT_ACTION_CREATEARTICLE_DESC="Crie um novo artigo Joomla."
PLG_CONVERTFORMSAPPS_CONTENT_CATID="Categoria"
PLG_CONVERTFORMSAPPS_CONTENT_CATID_DESC="O ID da categoria que será associada ao artigo. Esta opção lista todas as categorias publicadas para sua conveniência. Se você mapear esta opção com uma etiqueta inteligente, certifique-se de que ela retorne um ID de categoria válido."
PLG_CONVERTFORMSAPPS_CONTENT_STATE_DESC="O status do artigo. Se você mapear esta opção com uma marca inteligente, certifique-se de que ela retorne um dos seguintes códigos de status:<b> Publicado</b> = 1,<b> Não publicado</b> = 0, Lixeira<b> = -1, Arquivado<b> = 2."
PLG_CONVERTFORMSAPPS_CONTENT_TITLE="Título"
PLG_CONVERTFORMSAPPS_CONTENT_TITLE_DESC="O título do artigo. Observe que o alias do artigo será gerado automaticamente com base no título."
PLG_CONVERTFORMSAPPS_CONTENT_FEATURED="Destaque"
PLG_CONVERTFORMSAPPS_CONTENT_FEATURED_DESC="Defina se o artigo será destacado ou não. Se você mapear esta opção com uma etiqueta inteligente, certifique-se de que ela retorne 0 ou 1."
PLG_CONVERTFORMSAPPS_CONTENT_ACCESS="Nível de acesso"
PLG_CONVERTFORMSAPPS_CONTENT_ACCESS_DESC="Defina quem poderá acessar o artigo. Esta opção lista todos os níveis de acesso disponíveis para sua conveniência. Se você mapear esta opção com uma etiqueta inteligente, certifique-se de que ela retorne um ID de nível de acesso adequado."
PLG_CONVERTFORMSAPPS_CONTENT_NOTE="Observação"
PLG_CONVERTFORMSAPPS_CONTENT_NOTE_DESC="Adicione uma observação a este artigo. Isso é exibido apenas no backend da página de edição do artigo."
PLG_CONVERTFORMSAPPS_CONTENT_LANGUAGE="Idioma"
PLG_CONVERTFORMSAPPS_CONTENT_LANGUAGE_DESC="Se o seu site for multilíngue, selecione o idioma associado ao artigo. Caso contrário, selecione a opção “Todos” (padrão). Se você mapear esta opção com uma etiqueta inteligente, certifique-se de que ela retorne um código de idioma válido, por exemplo, en-GB ou el-GR. Retorne um asterisco ‘*’ se não quiser associá-lo a um idioma."
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_INTRO="Imagem de introdução"
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_INTRO_DESC="O caminho relativo da imagem deve ser usado nas visualizações de categoria, lista e destaque."
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_FULL="Imagem completa do artigo"
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_FULL_DESC="O caminho relativo da imagem deve ser usado na página de detalhes do artigo."
PLG_CONVERTFORMSAPPS_CONTENT_CREATED_BY="Autor"
PLG_CONVERTFORMSAPPS_CONTENT_CREATED_BY_DESC="O ID da conta do usuário representará o autor do artigo. Selecione a opção <b>Detectar usuário logado</b> para atribuir o usuário logado que envia o formulário como o autor do artigo. O artigo não terá autor se um usuário não logado enviar o formulário. Se você mapear esta opção com uma etiqueta inteligente, certifique-se de que ela retorne um ID de usuário válido."
PLG_CONVERTFORMSAPPS_CONTENT_DETECT_LOGGED_IN_USER="Detectar usuário logado"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_UP="Data de início da publicação"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_UP_DESC="Defina uma data para publicar o artigo no formato Y-M-D H:M:S. Deixe em branco para publicar o artigo imediatamente. Se você mapear essa opção com um campo Data e Hora, deverá definir seu formato como Y-m-d H:i."
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_DOWN="Data de término da publicação"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_DOWN_DESC="Defina uma data para cancelar a publicação do artigo no formato Y-M-D H:M:S. Deixe em branco para nunca cancelar a publicação do artigo. Se você mapear essa opção com um campo Data e Hora, deverá definir seu formato como Y-m-d H:i."
