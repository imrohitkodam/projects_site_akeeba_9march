PLG_CONVERTFORMSAPPS_CONTENT_ALIAS="Innehåll"
PLG_CONVERTFORMSAPPS_CONTENT="Convert Forms - Appar - Innehåll"
PLG_CONVERTFORMSAPPS_CONTENT_DESC="Skapa anpassade Joomla-formulär för att skapa artiklar."
PLG_CONVERTFORMSAPPS_CONTENT_ACTION_CREATEARTICLE="Skapa artikel"
PLG_CONVERTFORMSAPPS_CONTENT_ACTION_CREATEARTICLE_DESC="Skapa en ny Joomla-artikel."
PLG_CONVERTFORMSAPPS_CONTENT_CATID="Kategori"
PLG_CONVERTFORMSAPPS_CONTENT_CATID_DESC="ID för den kategori som ska kopplas till artikeln. Det här alternativet listar alla publicerade kategorier för att göra det enkelt. Om du mappar det här alternativet med en smart tagg, se till att det returnerar ett giltigt kategori-ID."
PLG_CONVERTFORMSAPPS_CONTENT_STATE_DESC="Artikelns status. Om du mappar det här alternativet med en smarttagg, se till att den returnerar en av följande statuskoder: <b>Publicerad</b> =1, <b>Avpublicerad</b> =0, <b>Kastad</b> =-1, <b>Arkiverad</b> =2."
PLG_CONVERTFORMSAPPS_CONTENT_TITLE="Rubrik"
PLG_CONVERTFORMSAPPS_CONTENT_TITLE_DESC="Artikelns rubrik. Observera att artikelns alias genereras automatiskt baserat på rubriken."
PLG_CONVERTFORMSAPPS_CONTENT_FEATURED="Utvald"
PLG_CONVERTFORMSAPPS_CONTENT_FEATURED_DESC="Ange om artikeln ska visas eller inte. Om du mappar det här alternativet med en smart tagg, se till att den returnerar 0 eller 1."
PLG_CONVERTFORMSAPPS_CONTENT_ACCESS="Åtkomstnivå"
PLG_CONVERTFORMSAPPS_CONTENT_ACCESS_DESC="Ange vem som ska kunna komma åt artikeln. Det här alternativet listar alla tillgängliga åtkomstnivåer för din bekvämlighet. Om du mappar det här alternativet med en smart tagg, se till att det returnerar ett korrekt åtkomstnivå-ID."
PLG_CONVERTFORMSAPPS_CONTENT_NOTE="Anteckning"
PLG_CONVERTFORMSAPPS_CONTENT_NOTE_DESC="Lägg till en anteckning till den här artikeln. Denna anteckning visas endast i backend på artikelns redigeringssida."
PLG_CONVERTFORMSAPPS_CONTENT_LANGUAGE="Språk"
PLG_CONVERTFORMSAPPS_CONTENT_LANGUAGE_DESC="Om din webbplats är flerspråkig, välj det språk som artikeln är kopplad till. Annars väljer du alternativet \"Alla\" (standard). Om du mappar det här alternativet med en smart tagg, se till att den returnerar en giltig språkkod, t.ex. en-GB eller el-GR. Returnera en asterisk '*' om du inte vill associera det med ett språk."
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_INTRO="Introbild"
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_INTRO_DESC="Bildens relativa sökväg är avsedd att användas i kategori-, lista- och utvalda vyer."
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_FULL="Full artikelbild"
PLG_CONVERTFORMSAPPS_CONTENT_IMAGE_FULL_DESC="Bildens relativa sökväg är avsedd att användas på artikelns detaljsida."
PLG_CONVERTFORMSAPPS_CONTENT_CREATED_BY="Författare"
PLG_CONVERTFORMSAPPS_CONTENT_CREATED_BY_DESC="Användarkontots ID representerar artikelns författare. Välj alternativet <b>Identifiera inloggad användare</b> för att koppla den inloggade användaren som skickar in formuläret som artikelns författare. Artikeln kommer inte att ha någon författare om en icke-inloggad användare skickar in formuläret. Om du mappar det här alternativet med en smart tagg, se till att den returnerar ett giltigt användar-ID."
PLG_CONVERTFORMSAPPS_CONTENT_DETECT_LOGGED_IN_USER="Identifiera inloggad användare"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_UP="Publiceringsdatum"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_UP_DESC="Ange ett datum för att publicera artikeln i formatet Y-M-D H:M:S. Lämna det tomt om du vill publicera artikeln omedelbart. Om du mappar det här alternativet med ett datum- och tidfält måste du ange dess format till Y-m-d H:i."
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_DOWN="Avpubliceringsdatum"
PLG_CONVERTFORMSAPPS_CONTENT_PUBLISH_DOWN_DESC="Ange ett datum för att avpublicera artikeln i formatet Y-M-D H:M:S. Lämna det tomt om du vill avpublicera artikeln omedelbart. Om du mappar det här alternativet med ett datum- och tidfält måste du ange dess format till Y-m-d H:i."
PLG_CONVERTFORMSAPPS_CONTENT_FULLTEXT="Text"
PLG_CONVERTFORMSAPPS_CONTENT_FULLTEXT_DESC="Artikelns text"
PLG_CONVERTFORMSAPPS_CONTENT_TAGS="Taggar"
PLG_CONVERTFORMSAPPS_CONTENT_TAGS_DESC="Tilldela en eller flera taggar till artikeln. Välj taggar från listan eller skriv dina egna. Om du vill tilldela en befintlig tagg med en smart tagg, se till att den returnerar ett giltigt tagg-ID. En ny tagg skapas och tilldelas om den smarta taggen returnerar text eller ett okänt tagg-ID. Om formuläret förväntas skapa taggar måste rätt behörigheter anges i komponenten Taggar. Om till exempel gästanvändare kommer åt formuläret måste du ge användargruppen Gäster behörighet att skapa taggar."
PLG_CONVERTFORMSAPPS_CONTENT_CUSTOM_FIELDS="Anpassade fält"
PLG_CONVERTFORMSAPPS_CONTENT_CUSTOM_FIELDS_DESC="Ange de anpassade fält som ska kopplas till artikeln. Du kan också använda smarta taggar. Observera att ett begränsat antal anpassade fält med flera värden stöds."
PLG_CONVERTFORMSAPPS_CONTENT_SELECT_CUSTOM_FIELD="Välj anpassat fält"
