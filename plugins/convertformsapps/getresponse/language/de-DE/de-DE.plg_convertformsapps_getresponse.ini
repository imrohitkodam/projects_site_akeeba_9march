PLG_CONVERTFORMSAPPS_GETRESPONSE_SELECT_CUSTOM_FIELD="Benutzerdefiniertes Feld auswählen"
PLG_CONVERTFORMSAPPS_GETRESPONSE_TAGS_REPLACE="Tags ersetzen"
PLG_CONVERTFORMSAPPS_GETRESPONSE_TAGS_REPLACE_DESC="Legt fest, welche Änderungen an den Schlagwörtern des Abonnenten vorgenommen werden sollen. <br><br><b>Nur hinzufügen</b>: Die oben angegebene Schlagwörter werden zu den bestehenden Schlagwörtern des Abonnenten hinzugefügt. <b>Alle ersetzen</b>: Alle vorhandenen Schlagwörter des Abonnenten werden gelöscht und durch die oben ausgewählten Schlagwörter ersetzt."
