PLG_CONVERTFORMSAPPS_GETRESPONSE_NAME="Name"
PLG_CONVERTFORMSAPPS_GETRESPONSE_NAME_DESC="Legen Sie den Namen des Abonnenten fest."
PLG_CONVERTFORMSAPPS_GETRESPONSE_DAYOFCYCLE="Autoresponder-Tag"
PLG_CONVERTFORMSAPPS_GETRESPONSE_DAYOFCYCLE_DESC="Geben Sie eine Zahl ein, die den Tag angibt, an dem der automatische Antworttext an den Benutzer gesendet wird ( z.B. 0 für den ersten Tag, 1 für den zweiten Tag, etc...). Weitere Informationen finden Sie <a href='https://www.tassos.gr/joomla-extensions/convert-forms/docs/sync-leads-with-getresponse#what-is-autoresponder-day' target='_blank'>hier</a>."
PLG_CONVERTFORMSAPPS_GETRESPONSE_CUSTOM_FIELDS="Benutzerdefinierte Felder"
