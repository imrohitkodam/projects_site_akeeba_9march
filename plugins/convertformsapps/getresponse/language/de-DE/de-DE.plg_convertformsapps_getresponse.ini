PLG_CONVERTFORMSAPPS_GETRESPONSE_ALIAS="GetResponse"
PLG_CONVERTFORMSAPPS_GETRESPONSE="Convert Forms – Apps – GetResponse"
PLG_CONVERTFORMSAPPS_GETRESPONSE_DESC="Fügen Sie Benutzer zu Ihrer GetResponse-Liste hinzu und beginnen Sie, Abonnenten zu sammeln."
PLG_CONVERTFORMSAPPS_GETRESPONSE_ACTION_SUBSCRIBE="Abonnent hinzufügen / aktualisieren"
PLG_CONVERTFORMSAPPS_GETRESPONSE_ACTION_SUBSCRIBE_DESC="Fügen Sie einen neuen Abonnenten zu einer von Ihnen gewählten Personengruppe hinzu. Kann auch zur Aktualisierung eines bestehenden Abonnenten verwendet werden."
PLG_CONVERTFORMSAPPS_GETRESPONSE_LIST="Liste"
