PLG_CONVERTFORMSAPPS_MAILCHIMP_ALIAS="MailChimp"
PLG_CONVERTFORMSAPPS_MAILCHIMP="Convert Forms – Apps – MailChimp"
PLG_CONVERTFORMSAPPS_MAILCHIMP_DESC="Fügen Sie Benutzer zu Ihrer MailChimp-Liste hinzu und beginnen Sie, Abonnenten zu sammeln."
PLG_CONVERTFORMSAPPS_MAILCHIMP_ACTION_SUBSCRIBE="Abonnent hinzufügen / aktualisieren"
PLG_CONVERTFORMSAPPS_MAILCHIMP_ACTION_SUBSCRIBE_DESC="Fügen Sie einen neuen Abonnenten zu einer von Ihnen gewählten Personengruppe hinzu. Kann auch zur Aktualisierung eines bestehenden Abonnenten verwendet werden."
PLG_CONVERTFORMSAPPS_MAILCHIMP_INTERESTS_REPLACE="Gruppen ersetzen"
PLG_CONVERTFORMSAPPS_MAILCHIMP_INTERESTS_REPLACE_DESC="Legt fest, welche Änderungen an den Gruppen/Interessen des Abonnenten vorgenommen werden sollen. <br><br><b>Nur hinzufügen</b>: Die oben angegebene Gruppen werden zu den bestehenden Gruppen/Interessen des Abonnenten hinzugefügt. <b>Alle ersetzen</b>: Alle vorhandenen Gruppen des Abonnenten werden gelöscht und durch die oben ausgewählten Gruppen ersetzt."
PLG_CONVERTFORMSAPPS_MAILCHIMP_TAGS_REPLACE="Tags ersetzen"
PLG_CONVERTFORMSAPPS_MAILCHIMP_TAGS_REPLACE_DESC="Legt fest, welche Änderungen an den Schlagwörtern des Abonnenten vorgenommen werden sollen. <br><br><b>Nur hinzufügen</b>: Die oben angegebene Schlagwörter werden zu den bestehenden Schlagwörtern des Abonnenten hinzugefügt. <b>Alle ersetzen</b>: Alle vorhandenen Schlagwörter des Abonnenten werden gelöscht und durch die oben ausgewählten Schlagwörter ersetzt."
PLG_CONVERTFORMSAPPS_MAILCHIMP_INTERESTS="Gruppen"
PLG_CONVERTFORMSAPPS_MAILCHIMP_INTERESTS_DESC="Wählen Sie die Gruppen aus, die mit dem Abonnenten verknüpft sind"
PLG_CONVERTFORMSAPPS_MAILCHIMP_MERGE_TAG="Dies ist der Merge-Tag %s in den Einstellungen Ihrer MailChimp-Zielgruppe"
