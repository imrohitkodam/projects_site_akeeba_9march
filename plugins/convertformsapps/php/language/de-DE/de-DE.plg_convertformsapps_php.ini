PLG_CONVERTFORMSAPPS_PHP_PHP="PHP"
PLG_CONVERTFORMSAPPS_PHP_PHP_DESC="Geben Sie den PHP-Code ein, der ausgeführt werden soll. Sie können die Datenbank abfragen, Daten an eine URL senden oder sogar Daten von einer API abrufen. Der Phantasie sind keine Grenzen gesetzt. <h4>SPEZIELLE VARIABLEN</h4>Im Folgenden finden Sie einige spezielle Variablen, die Sie in Ihrem Code verwenden können.<br><br>- <em>$form</em> (Array) Die Einstellungen des Formulars<br>- <em>$submission</em> (Objekt) Die endgültige Übermittlung mit den vom Benutzer eingegebenen Werten<br>- <em>$responses</em> (Array) Die Antworten der zuvor ausgeführten Schritte<h4>DATEN AN DEN NÄCHSTEN SCHRITT WEITERGEBEN</h4>Verwenden Sie die Anweisung <em>return $var;</em> um <em>$var</em> im nächsten Schritt unter Verwendung des Smart Tags {task.prev.response} verfügbar zu machen. Sie können ein Array oder Objekt zurückgeben und auf jede Eigenschaft mit der Syntax <em>{task.prev.response.PROPERTY}</em> zugreifen. Verwenden Sie die Punktnotationssyntax für den Zugriff auf unbegrenzte abhängige Eigenschaften. <br><br>Zum Beispiel: Wenn Sie ein Array wie dieses zurückgeben: <em>return [ 'name' => 'John', 'age' => 23]</em>, können Sie auf die Eigenschaft <em>age</em> im nächsten Schritt zugreifen in dem Sie die Syntax <em>{task.prev.response.age}</em> benutzen. Wenn Sie nur eine Zahl oder einen String zurückgeben, verwenden Sie <em>{task.prev.response}</em> stattdessen.<br><br>Die öffnenden und schließenden PHP-Tags (&lt;?php ?>) brauchen Sie nicht zu setzen."
