PLG_CONVERTFORMSAPPS_PHP_PHP_DESC="Ingresa el código PHP para ejecutar. Puedes consultar la base de datos, enviar datos a una URL o incluso obtener datos de una API. ¡El cielo es el límite! <h4>VARIABLES ESPECIALES</h4> A continuación se muestran algunas variables especiales que puedes usar en tu código. <br><br>- <em>$form</em> (Array) Los ajustes del formulario<br> - <em>$submission</em> (Object) La presentación final con los valores enviados por el usuario<br> - <em>$responses</em> (Array) Las respuestas de los pasos ejecutados anteriormente <h4>PASAR DATOS AL SIGUIENTE PASO</h4> Utiliza la declaración <em>return $var;</em> para hacer que <em>$var</em> esté disponible en el siguiente paso utilizando la etiqueta inteligente <em>{task.prev.response}</em>. Puedes devolver un Array u Objeto y acceder a cualquier propiedad utilizando la sintaxis <em>{task.prev.response.PROPERTY}</em>. Utiliza la sintaxis de notación de punto para acceder a propiedades de profundidad ilimitada. <br><br>Por ejemplo: Si devuelves un array como este: <em>return [ 'nombre' => 'Juan', 'edad' => 23]</em>, puedes acceder a la propiedad <em>age</em> en el siguiente paso usando la sintaxis <em>{task.prev.response.age}</em>. Si solo devuelves un número o una cadena, utiliza <em>{task.prev.response}</em> en su lugar. <br><br>No es necesario incluir las etiquetas de apertura y cierre de PHP (&lt;php ?>)."
