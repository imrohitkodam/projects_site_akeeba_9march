PLG_CONVERTFORMSAPPS_PHP_PHP_DESC="Digite o código PHP para executar. Você pode consultar o banco de dados, postar dados em uma URL ou até mesmo buscar dados de uma API. O céu é o limite. <h4>VARIÁVEIS ESPECIAIS</h4>Abaixo estão algumas variáveis especiais que você pode usar em seu código.<br><br>-<em> $form (Array) As configurações do formulário<br>- <em>$submission</em> (Object) O envio final com os valores enviados pelo usuário<br>-<em>$responses</em> (Array) As respostas das etapas executadas anteriormente<h4>PASS DADOS PARA A PRÓXIMA ETAPA Use <em>return $var; </em>instrução para disponibilizar<em> $var</em> na próxima etapa usando a tag inteligente {.prev.response}.</em> Você pode retornar um Array ou Object e acessar qualquer propriedade usando a sintaxe <em>{task.prev.response.PROPERTY}.</em> Use a sintaxe de notação de ponto para acessar propriedades detalhadas ilimitadas.<br><br> Por exemplo: se você retornar um array como este:<em> return [ 'name' => 'John', 'age' => 23]</em>, você pode acessar a age <em>propriedade na próxima etapa usando <em>{task.prev.response.age } </em>sintaxe. Se você retornar apenas um número ou string, use {task.prev.response}.<em>em vez de.<br><br> Você não precisa incluir as tags de abertura e fechamento do PHP (&lt;?php ?>)."
