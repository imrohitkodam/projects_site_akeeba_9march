PLG_CONVERTFORMSAPPS_PHP_PHP_DESC="Ange PHP-koden för att köra. Du kan fråga databasen, du kan skicka data till en URL eller till och med hämta data från ett API. Endast din kunskap sätter gränser. <h4>SPECIALVARIABLER</h4>Nedan följer några specialvariabler som du kan använda i din kod.<br><br>- <em>$form</em> (Array) Formulärets inställningar<br>- <em>$submission</em> (Object) Den slutliga inlämningen med användarens inskickade värden<br>- <em>$responses</em> (Array) Svaren från de tidigare utförda stegen<h4>PASS DATA TO NEXT STEP</h4>Använd <em>return $var;</em> sammanställning att göra <em>$var</em> tillgänglig för nästa steg med hjälp av <em>{task.prev.response}</em> Smart Tagg. Du kan returnera en array eller ett objekt och komma åt valfri egenskap med hjälp av <em>{task.prev.response.PROPERTY}</em> syntax. Använd punktnotationssyntaxen för att få åtkomst till obegränsade djupgående egenskaper. <br><br>Till exempel: Om du returnerar en array som denna: <em>return [ 'name' => 'John', 'age'  => 23]</em>, kan du komma åt egenskapen <em>age</em> i nästa steg med hjälp av <em>{task.prev.response.age}</em> syntaxen. Om du endast returnerar en siffra eller sträng, använd <em>{task.prev.response}</em> istället.<br><br>Du behöver inte inkludera PHP-inledande och avslutande taggar (&lt;?php ?>)"
