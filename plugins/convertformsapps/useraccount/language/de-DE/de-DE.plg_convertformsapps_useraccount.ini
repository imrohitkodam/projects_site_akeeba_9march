PLG_CONVERTFORMSAPPS_USERACCOUNT_ALIAS="Benutzerkonto"
PLG_CONVERTFORMSAPPS_USERACCOUNT="Convert Forms – Apps – Benutzerkonto"
PLG_CONVERTFORMSAPPS_USERACCOUNT_DESC="Erstellen Sie ein neues Joomla-Benutzerkonto."
PLG_CONVERTFORMSAPPS_USERACCOUNT_ACTION_REGISTER="Joomla-Benutzerkonto erstellen"
PLG_CONVERTFORMSAPPS_USERACCOUNT_ACTION_REGISTER_DESC="Erstellen Sie ein neues Joomla-Benutzerkonto."
PLG_CONVERTFORMSAPPS_USERACCOUNT_GROUPS="Benutzer-Gruppen"
PLG_CONVERTFORMSAPPS_USERACCOUNT_GROUPS_DESC="Wählen Sie die Gruppen aus, die mit dem neuen Benutzerkonto verknüpft werden sollen. Gruppen mit Administrator- oder Superuser-Rechten können aus Sicherheitsgründen nicht ausgewählt werden."
PLG_CONVERTFORMSAPPS_USERACCOUNT_ACTIVATION_DESC="Wählen Sie die Bedingungen für die Kontoaktivierung aus. Die verfügbaren Optionen sind: <b>Global verwenden</b>: Es wird die auf der Seite Benutzerkonfiguration eingestellte Option verwendet. <b>Keine</b>: Das Benutzerkonto wird sofort aktiviert und der Benutzer kann sich sofort anmelden (auch wenn seine E-Mail-Adresse ungültig ist). <b>Selbstaktivierung</b>: Der Nutzer erhält per E-Mail einen Link zur Aktivierung seines Kontos, bevor er sich anmelden kann. <b>Administrator</b>: Der Benutzer erhält eine E-Mail mit einem Link zur Aktivierung seines Kontos, bevor er sich anmelden kann. Dann werden alle Benutzer, die System-E-Mails erhalten und die Berechtigung haben, Benutzer anzulegen, benachrichtigt, um das Benutzerkonto zu aktivieren."
PLG_CONVERTFORMSAPPS_USERACCOUNT_GENERATE_RANDOM_PASSWORD="Zufälliges Passwort generieren"
PLG_CONVERTFORMSAPPS_USERACCOUNT_PASSWORD="Passwort"
PLG_CONVERTFORMSAPPS_USERACCOUNT_PASSWORD_DESC="Das Passwort für das Benutzerkonto. Wenn das Feld leer gelassen wird, wird ein Zufallspasswort verwendet."
PLG_CONVERTFORMSAPPS_USERACCOUNT_EMAIL="E-Mail-Adresse"
PLG_CONVERTFORMSAPPS_USERACCOUNT_EMAIL_DESC="Die E-Mail-Adresse des Benutzerkontos"
PLG_CONVERTFORMSAPPS_USERACCOUNT_NAME="Vollständiger Name"
PLG_CONVERTFORMSAPPS_USERACCOUNT_NAME_DESC="Der vollständige Name des Benutzerkontos."
PLG_CONVERTFORMSAPPS_USERACCOUNT_USERNAME="Benutzername"
PLG_CONVERTFORMSAPPS_USERACCOUNT_USERNAME_DESC="Der Benutzername des Benutzerkontos"
PLG_CONVERTFORMSAPPS_USERACCOUNT_CUSTOM_FIELDS="Benutzerdefinierte Felder"
PLG_CONVERTFORMSAPPS_USERACCOUNT_CUSTOM_FIELDS_DESC="Geben Sie die benutzerdefinierten Felder an, die mit dem Benutzer verknüpft werden sollen. Sie können auch Smart Tags verwenden. Beachten Sie, dass nur eine begrenzte Anzahl von benutzerdefinierten Felder mit mehreren Werten (multi-value) unterstützt wird."
PLG_CONVERTFORMSAPPS_USERACCOUNT_SELECT_CUSTOM_FIELD="Benutzerdefiniertes Feld auswählen"
PLG_CONVERTFORMSAPPS_USERACCOUNT_REQUIRE_PASSWORD_RESET="Passwort-Rücksetzung verlangen"
PLG_CONVERTFORMSAPPS_USERACCOUNT_REQUIRE_PASSWORD_RESET_DESC="Verlangen Sie von den Benutzern, dass diese ihr Passwort bei der ersten Anmeldung zurücksetzen bzw. neu vergeben. Dies ist nützlich, wenn das Passwort bei der Erstellung des Accounts automatisch generiert oder manuell zugewiesen wird und somit öffentlich bekannt ist."
