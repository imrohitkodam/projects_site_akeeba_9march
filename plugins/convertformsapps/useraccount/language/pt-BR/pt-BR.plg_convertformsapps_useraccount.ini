PLG_CONVERTFORMSAPPS_USERACCOUNT_ACTIVATION_DESC="Selecione o requisito para ativação da conta. As opções disponíveis são: Global: <b>Utilizará a opção definida na Página de Configuração do Usuário. <b>Nenhum: </b>A conta do usuário será ativada imediatamente e o usuário poderá fazer login imediatamente (mesmo que seu endereço de e-mail seja inválido). <b>Próprio:</b> O usuário receberá um link por e-mail para ativar sua conta antes de poder fazer login.<b> Administrador: </b>O usuário receberá por e-mail um link para ativar sua conta antes de poder fazer login. Em seguida, todos os usuários configurados para receber e-mails do sistema e que tenham permissão para criar usuários serão notificados para ativar a conta do usuário."
