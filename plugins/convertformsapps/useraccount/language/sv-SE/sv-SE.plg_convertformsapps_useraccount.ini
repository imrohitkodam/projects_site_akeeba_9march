PLG_CONVERTFORMSAPPS_USERACCOUNT_GROUPS_DESC="Välj de grupper som ska kopplas till det nya användarkontot. Grupper med administratörs- eller superanvändarbehörighet kan inte väljas av säkerhetsskäl."
PLG_CONVERTFORMSAPPS_USERACCOUNT_ACTIVATION_DESC="Välj kravet för kontoaktivering. De tillgängliga alternativen är: <b>Använd global</b>: Den kommer att använda alternativet som är inställt på sidan för användarkonfiguration. <b>Ingen</b>: Användarkontot aktiveras omedelbart och användaren kan logga in direkt (även om e-postadressen är ogiltig). <b>Själv</b>: Användaren kommer att få en länk via e-post för att aktivera sitt konto innan de kan logga in. <b>Administratör</b>: Användaren kommer att få en länk via e-post för att aktivera sitt konto innan de kan logga in. Sedan kommer alla användare som är inställda på att ta emot systemmejl och som har behörighet att skapa användare att meddelas om att aktivera användarens konto."
