PLG_CONVERTFORMSTOOLS_GATRACKER="Convert Forms - Rastreador do Google Analytics"
PLG_CONVERTFORMSTOOLS_GATRACKER_ALIAS="Rastreamento do Google Analytics"
PLG_CONVERTFORMSTOOLS_GATRACKER_DESC="Acompanhe eventos de formulário com sua conta do Google Analytics.<br><br> Os eventos suportados são:<b> Carga</b> que é rastreada durante o carregamento da página, <b>Conversão</b> que é rastreada quando o formulário é enviado com sucesso<b> e Erro</b> que é rastreado sempre que ocorre um erro.<br><br> Os dados rastreados podem ser encontrados no Comportamento -> seção Eventos da sua conta do Google Analytics. Todos os eventos são rastreados na categoria Convert Forms  por padrão."
