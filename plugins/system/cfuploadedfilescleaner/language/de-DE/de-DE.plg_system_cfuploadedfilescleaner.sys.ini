PLG_SYSTEM_CFUPLOADEDFILESCLEANER="System – Convert Forms Bereinigung hochgeladener Dateien"
PLG_SYSTEM_CFUPLOADEDFILESCLEANER_DESC="Wenn Sie viele Uploads erhalten, kann der von den hochgeladenen Dateien belegte Speicherplatz auf dem Server schnell ansteigen, so dass Sie regelmäßig Speicherplatz freimachen müssen. Dieses Plugin löscht hochgeladene Dateien automatisch, basierend auf dem Zeitpunkt, der in jedem Datei-Upload-Feld in jedem Formular festgelegt wurde.<br><br><b>Cron Job URL</b>: http://[SITE_URL]/index.php?option=com_convertforms&task=cron&secret=[SECRET_KEY]&command=uploadedfilescleaner"
