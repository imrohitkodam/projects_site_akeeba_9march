PLG_SYSTEM_CFUPLOADEDFILESCLEANER="Sistema - Convert Forms Limpador de Arquivos Enviados"
PLG_SYSTEM_CFUPLOADEDFILESCLEANER_DESC="Se você estiver recebendo muitos uploads, o espaço do servidor usado pelos arquivos enviados pode aumentar rapidamente, exigindo algumas tarefas regulares para liberar espaço. Este plug-in exclui automaticamente os arquivos carregados com base no período definido em cada campo de upload de arquivo em cada formulário. <br><br><b>Cron Job URL</b>: http://[SITE_URL]/index.php?option=com_convertforms&task=cron&secret=[SECRET_KEY]&command=uploadedfilescleaner"
